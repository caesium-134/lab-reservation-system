<html>
    <head>
        <link href = "css/style.css" rel = "stylesheet" type = "text/css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>
    <body>
        <div class = "header">
            <div class = "header-left">
                Lab Reservation System
            </div>

            <div class = "header-right">
                <div class = "username">
                    miguel
                </div>
                <img src = "https://img.freepik.com/premium-vector/default-avatar-profile-icon-social-media-user-image-gray-avatar-icon-blank-profile-silhouette-vector-illustration_561158-3407.jpg?w=360">
                <div class = "logout">
                    Logout
                    <span><i class="fa fa-sign-out" aria-hidden="true"></i></span>
                </div>
            </div>
        </div>
        <div class = "content">
            <div class = "sidebar">
                <div class = "nav">Dashboard</div>
                <div class = "nav">Laboratories</div>
                <div class = "nav">Reservations</div>
                <div class = "nav"></div>
            </div>
        <div class = "main-content">
            <div class = "main-content">
                <div class = "dashboard-header">
                    Reservations
                </div>

                <div class = "view-reservation-content">
                    <table class = "view-reservation-table">
                        <tr>
                            <th>Room</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                        <tr>
                            <td>Lab 1</td>
                            <td>Feb 14</td>
                            <td>10 - 12</td>
                            <td>Approved</td>
                        </tr>
                        <tr>
                            <td>Lab 2</td>
                            <td>March 14</td>
                            <td>1 - 3</td>
                            <td>Approved</td>
                        </tr>
                        <tr>
                            <td>Lab 3</td>
                            <td>March 21</td>
                            <td>930 - 1030</td>
                            <td>Approved</td>
                        </tr>
                    </table>

                    <footer class = "view-reservation-footer">
                        <button class="add-btn">Add Reservation</button>
                    </footer>
                </div>
            </div>
        </div>
    </body>
</html>
