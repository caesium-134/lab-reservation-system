<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width", initial-scale="1.0"> 
    <title>Lab Reservation</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body> 
    <nav class="navbar">
        <h1>Lab Seat Reservation</h1>
        <div class="nav-right">
            <a href="dashboard.html" class="btn-secondary">Back to Dashboard</a>
             <button class="btn-secondary">Logout</button>
        </div> 
    </nav>

    <div class="container">
        <div class="reservation-section">
            <h2>Reserve a Seat</h2>

            <div class="week-selector">
                <button class="btn-secondary">Previous Week</button>
                <span id="week-display"></span>
                <button class="btn-secondary">Next Week</button>
            </div>

            <div class="filter-section">
                <label>Filter by Day:</label>
                <select id="day-filter">
                    <option value="all">All</option>
                    <option value="Mon">Monday</option>
                    <option value="Tues">Tuesday</option>
                    <option value="Wed">Wednesday</option>
                    <option value="Thurs">Thursday</option>
                    <option value="Fri">Friday</option>
                    <option value="Sat">Saturday</option>
                </select>
            </div>

            <div id="reservation-calendar">
                <!-- Hardcoded Date: Monday - February 10, 2026 -->
                <div class="day-schedule">
                    <span class="day-name">Monday</span>
                    <span class="day-date">February 10, 2026</span>
                </div>
                <div class="timeslot">
                    <div class="timeslot-row">
                        <span class="timeslot-time">
                            12:00 - 13:00
                        </span>
                    </div>
                    <div class="seat-grid">
                        <input type="checkbox" id="monday-am-s1" class="seat-cb"> 
                        <label for="monday-am-s1" class="seat-slot seat-available">Seat 1</label>
                        <span class="seat-slot seat-occupied">Seat 2</span>
                    </div>
                </div>
            </div>
 
        </div>
    </div>
</body>
</html>
